<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habib Metro Biometric App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #004080, #00aaff);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(0,0,0,0.3);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            margin-bottom: 25px;
            font-size: 16px;
        }

        .download-btn {
            background: #00ffcc;
            color: #003333;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: #00cc99;
            transform: scale(1.05);
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Habib Metro Biometric App</h1>
        <p>Download the latest APK file in one click</p>

        <!-- APK Download Button -->
        <a href="YOUR_APK_LINK_HERE.apk" class="download-btn" download>
            Download App
        </a>

        <footer>
            © 2026 Habib Metro - All Rights Reserved
        </footer>
    </div>

</body>
</html>
